<h2 mat-dialog-title>詳細情報 No.{{data.row.position}}</h2>

<mat-dialog-content>

  <div class="section">
    <p>日付　：{{data.row.date}}</p>
  </div>

  <div class="section">
    <p>議員名：{{data.row.member}}　({{data.row.type}})</p>
  </div>

  <div class="section">
    <p>テーマ：</p>
    <p>{{data.row.theme}}</p>
  </div>

  @if (data.row.movielink) {
  <div class="section">
    <a [href]="data.row.movielink" target="_blank">
      動画リンク
    </a>
  </div>
  }

  <div class="section">
    <p>会議名：{{data.row.meeting}}</p>
  </div>

  <div class="section">
    <p>政権　：{{data.row.administration}}</p>
  </div>

  @if (data.row.minutes) {
  <div class="section">
    <a [href]="data.row.minutes" target="_blank">議事録リンク</a>
  </div>
  }

  <div class="section">
    <p>タイムスタンプ：</p>
    <p class="multiline">{{data.row.timestamp}}</p>
  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>
    閉じる
  </button>
</mat-dialog-actions>
